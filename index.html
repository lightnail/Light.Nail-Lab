<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光 · 美甲價目表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #ecdcc8;
    --gold: #b8895a;
    --gold-light: #d4aa80;
    --gold-dark: #7a5230;
    --charcoal: #2a1f14;
    --soft-brown: #5c3d22;
    --muted: #9c7c5e;
    --divider: #d4b898;

    /* 胡桃木色 */
    --walnut: #4a2e1a;
    --walnut-light: #6b4226;
    --walnut-text: #f0e0cc;
    --walnut-em: #e8c49a;
    --walnut-closing: #d4a878;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background-color: var(--cream);
color: var(--charcoal);
font-family: 'Noto Sans TC', sans-serif;
font-weight: 300;
min-height: 100vh;
overflow-x: hidden;
background-image:
radial-gradient(ellipse at 20% 0%, #e8d0b0 0%, transparent 50%),
radial-gradient(ellipse at 80% 100%, #dfc4a0 0%, transparent 50%);
}

body::before {
content: '';
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
pointer-events: none;
z-index: 0;
opacity: 0.6;
}

.container {
max-width: 680px;
margin: 0 auto;
padding: 0 24px 80px;
position: relative;
z-index: 1;
}

/* Header */
header {
text-align: center;
padding: 60px 0 44px;
}

.header-line {
width: 1px;
height: 60px;
background: linear-gradient(to bottom, transparent, var(--gold));
margin: 0 auto 28px;
animation: grow-down 1.2s ease forwards;
}

@keyframes grow-down {
from { height: 0; opacity: 0; }
to { height: 60px; opacity: 1; }
}

.brand-name {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(72px, 18vw, 110px);
font-weight: 300;
letter-spacing: 0.15em;
color: var(--charcoal);
line-height: 1;
animation: fade-up 1s ease 0.3s both;
}

.brand-sub {
font-family: 'Noto Serif TC', serif;
font-size: 12px;
letter-spacing: 0.4em;
color: var(--gold);
margin-top: 14px;
text-transform: uppercase;
animation: fade-up 1s ease 0.5s both;
}

.header-ornament {
display: flex;
align-items: center;
justify-content: center;
gap: 16px;
margin-top: 28px;
animation: fade-up 1s ease 0.7s both;
}

.ornament-line {
height: 1px;
width: 80px;
background: linear-gradient(to right, transparent, var(--gold-light));
}
.ornament-line.right {
background: linear-gradient(to left, transparent, var(--gold-light));
}
.ornament-dot {
width: 4px; height: 4px;
border-radius: 50%;
background: var(--gold);
}

@keyframes fade-up {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

/* Social Links */
.social-bar {
display: flex;
justify-content: center;
gap: 14px;
margin-bottom: 44px;
animation: fade-up 0.8s ease 0.85s both;
}

.social-btn {
display: flex;
align-items: center;
gap: 8px;
padding: 9px 20px;
border: 1px solid var(--divider);
border-radius: 40px;
text-decoration: none;
color: var(--muted);
font-size: 11.5px;
letter-spacing: 0.15em;
font-family: 'Noto Sans TC', sans-serif;
font-weight: 300;
transition: all 0.25s ease;
background: transparent;
}

.social-btn:hover {
border-color: var(--gold);
color: var(--soft-brown);
background: var(--warm-white);
}

.social-btn svg {
width: 14px;
height: 14px;
flex-shrink: 0;
opacity: 0.65;
transition: opacity 0.2s;
}

.social-btn:hover svg { opacity: 1; }

/* Tab Nav */
.tab-nav-wrap {
margin-bottom: 40px;
animation: fade-up 0.8s ease 0.9s both;
}

.tab-nav-hint {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
margin-bottom: 10px;
font-size: 10.5px;
letter-spacing: 0.18em;
color: var(--muted);
}

.tab-nav-hint-dot {
display: inline-flex;
gap: 3px;
}

.tab-nav-hint-dot span {
display: inline-block;
width: 4px; height: 4px;
border-radius: 50%;
background: var(--gold-light);
animation: hint-bounce 1.4s ease-in-out infinite;
}
.tab-nav-hint-dot span:nth-child(2) { animation-delay: 0.2s; }
.tab-nav-hint-dot span:nth-child(3) { animation-delay: 0.4s; }

@keyframes hint-bounce {
0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
40% { transform: translateY(-4px); opacity: 1; }
}

.tab-nav {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}

.tab-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
padding: 14px 8px 12px;
background: var(--cream);
border: 1.5px solid var(--divider);
border-radius: 10px;
cursor: pointer;
transition: all 0.22s ease;
font-family: 'Noto Sans TC', sans-serif;
font-weight: 300;
color: var(--muted);
position: relative;
overflow: hidden;
box-shadow: 0 1px 4px rgba(90,50,20,0.06);
-webkit-tap-highlight-color: transparent;
}

/* ripple effect on tap */
.tab-btn::before {
content: '';
position: absolute;
inset: 0;
background: var(--warm-white);
opacity: 0;
transition: opacity 0.22s;
z-index: 0;
}

.tab-btn:hover::before,
.tab-btn:active::before { opacity: 1; }
.tab-btn:hover { border-color: var(--gold-light); color: var(--soft-brown); transform: translateY(-1px); }
.tab-btn:active { transform: scale(0.97); }

.tab-btn.active {
border-color: var(--gold);
background: #e8d4b8;
color: var(--charcoal);
box-shadow: 0 2px 10px rgba(184,137,90,0.18);
}

.tab-btn.active::after {
content: '';
position: absolute;
bottom: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(to right, var(--gold-light), var(--gold), var(--gold-light));
border-radius: 0 0 10px 10px;
}

/* pulse ring on active tab to draw attention */
.tab-btn.active .tab-icon::after {
content: '';
position: absolute;
inset: -4px;
border-radius: 50%;
border: 1.5px solid var(--gold-light);
animation: tab-pulse 2s ease-out infinite;
}

@keyframes tab-pulse {
0% { transform: scale(0.8); opacity: 0.8; }
70% { transform: scale(1.5); opacity: 0; }
100% { transform: scale(1.5); opacity: 0; }
}

.tab-icon {
font-size: 22px;
line-height: 1;
position: relative;
z-index: 1;
}

.tab-label {
font-size: 12px;
letter-spacing: 0.12em;
position: relative;
z-index: 1;
white-space: nowrap;
}

/* small tap indicator below non-active tabs */
.tab-btn:not(.active) .tab-label::after {
content: '▾';
display: block;
font-size: 8px;
color: var(--gold-light);
margin-top: 2px;
opacity: 0.7;
}

/* Tab Panels */
.tab-panel { display: none; }
.tab-panel.active {
display: block;
animation: panel-in 0.35s ease both;
}

@keyframes panel-in {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}

/* Section */
.section { margin-bottom: 48px; }

/* Sub-section */
.sub-section { margin-bottom: 28px; }

.sub-label {
font-size: 10px;
letter-spacing: 0.35em;
color: var(--gold);
text-transform: uppercase;
margin-bottom: 16px;
font-family: 'Noto Sans TC', sans-serif;
font-weight: 400;
display: flex;
align-items: center;
gap: 12px;
}

.sub-label::after {
content: '';
flex: 1;
height: 1px;
background: var(--divider);
}

/* Price items */
.price-item {
display: flex;
align-items: baseline;
justify-content: space-between;
padding: 10px 0;
border-bottom: 1px solid var(--divider);
position: relative;
}

.price-item:last-child { border-bottom: none; }

.price-item:hover::before {
content: '';
position: absolute;
inset: 0 -12px;
background: var(--warm-white);
border-radius: 4px;
z-index: -1;
}

.item-name {
font-size: 14px;
color: var(--soft-brown);
letter-spacing: 0.05em;
line-height: 1.6;
}

.item-name .note {
font-size: 11px;
color: var(--muted);
display: block;
margin-top: 3px;
line-height: 1.7;
letter-spacing: 0.03em;
}

.item-price {
font-family: 'Cormorant Garamond', serif;
font-size: 20px;
font-weight: 400;
color: var(--charcoal);
letter-spacing: 0.02em;
white-space: nowrap;
margin-left: 16px;
flex-shrink: 0;
}

.item-price .currency { font-size: 13px; color: var(--muted); margin-right: 1px; }
.item-price .unit { font-size: 12px; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; font-weight: 300; }

.price-item.plus { border-bottom: none; padding: 6px 0; }
.price-item.plus .item-name { color: var(--muted); font-size: 14px; }
.price-item.plus .item-price { font-size: 20px; color: var(--soft-brown); }

/* Care items */
.care-item {
padding: 18px 0;
border-bottom: 1px solid var(--divider);
}
.care-item:last-child { border-bottom: none; }

.care-header {
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 10px;
}

.care-name {
font-family: 'Noto Serif TC', serif;
font-size: 15px;
font-weight: 400;
color: var(--charcoal);
letter-spacing: 0.08em;
}

.care-price-block {
text-align: right;
flex-shrink: 0;
margin-left: 16px;
}

.care-price {
font-family: 'Cormorant Garamond', serif;
font-size: 22px;
color: var(--charcoal);
}

.care-duration {
font-size: 11px;
color: var(--muted);
letter-spacing: 0.05em;
display: block;
margin-top: 2px;
}

.care-desc {
font-size: 11.5px;
color: var(--muted);
line-height: 2;
letter-spacing: 0.04em;
}

.care-desc span { display: inline-block; padding: 0 4px; }
.care-desc span::after { content: '→'; margin-left: 6px; color: var(--gold-light); }
.care-desc span:last-child::after { display: none; }

.care-addon {
margin-top: 20px;
padding: 16px 20px;
background: var(--warm-white);
border-left: 2px solid var(--gold-light);
border-radius: 2px;
}

.care-addon-title {
font-size: 10px;
letter-spacing: 0.3em;
color: var(--gold-dark);
margin-bottom: 10px;
text-transform: uppercase;
}

.care-addon-row {
display: flex;
justify-content: space-between;
font-size: 13px;
color: var(--soft-brown);
padding: 5px 0;
}

.care-addon-row .ap {
font-family: 'Cormorant Garamond', serif;
font-size: 17px;
color: var(--charcoal);
}

grid-template-columns: rep
